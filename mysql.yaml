- name: Deploy MySQL in Podman
  hosts: mysql
  become: yes
  tasks:
    - name: Install MySQL Server  # AMI RHEL - 9
      ansible.builtin.package:
        name: mysql-server
        state: present 

    - name: Start MySQL server
      ansible.builtin.systemd:   # use systemd module for RHEL
        name: mysqld
        state: started
        enabled: true
