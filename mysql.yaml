- name: Deploy MySQL in Podman
  hosts: mysql
  become: yes
  tasks:
  - name: Install MySQL Server  # AMI RHEL - 9
    ansible.builtin.package:
      name: mysql-server
      state: present 
  - name: start mysql server 
    ansible.builtin.service: 
      name: mysql 
      state: started 
      enable: yes 
