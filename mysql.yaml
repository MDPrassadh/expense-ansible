- name: Prepare environment and deploy MySQL
  hosts: localhost
  tasks:
    - name: Scan MySQL host key
      command: ssh-keyscan -t ed25519 mysql.jioairlines.online
      register: mysql_hostkey
      changed_when: false
      failed_when: mysql_hostkey.rc != 0

    - name: Ensure MySQL host key is correct
      ansible.builtin.known_hosts:
        path: /home/ec2-user/.ssh/known_hosts
        name: mysql.jioairlines.online
        key: "{{ mysql_hostkey.stdout }}"
        state: present

- name: Deploy MySQL in Podman
  hosts: mysql
  become: yes
  vars: 
    mysql_root_password: ExpenseApp@1
    login_host: mysql.jioairlines.online

  tasks:
    - name: Install MySQL Server (RHEL 9)
      ansible.builtin.package:
        name: mysql-server
        state: present

    - name: Start MySQL server
      ansible.builtin.systemd:
        name: mysqld
        state: started
        enabled: true
    
    - name: Connect to MySQL server
      community.mysql.mysql_info: 
        login_user: root 
        login_password: "{{ mysql_root_password }}"
        login_host: "{{ login_host }}"
      register: mysql_info 

    - name: Print MySQL info 
      ansible.builtin.debug: 
        msg: "{{ mysql_info }}"

    - name: Setup MySQL root password if not set
      ansible.builtin.command: >
        mysqladmin -u root password {{ mysql_root_password }}
      when: mysql_info.failed is true
 






























