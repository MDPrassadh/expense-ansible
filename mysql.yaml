- name: Deploy MySQL in Podman
  hosts: mysql
  become: yes

  pre_tasks:
    - name: Remove old host key
      command: ssh-keygen -R mysql.jioairlines.online

  tasks:
    - name: Install MySQL Server  # AMI RHEL - 9
      ansible.builtin.package:
        name: mysql-server
        state: present 

    - name: Start MySQL server
      ansible.builtin.systemd:
        name: mysqld
        state: started
        enabled: true
