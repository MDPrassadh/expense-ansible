- name: Prepare environment and deploy MySQL
  hosts: localhost
  tasks:
    - name: Remove old host key for MySQL
      command: ssh-keygen -R mysql.jioairlines.online

    - name: Remove old host key for Backend
      command: ssh-keygen -R backend.jioairlines.online

    - name: Remove old host key for Frontend
      command: ssh-keygen -R frontend.jioairlines.online

- name: Deploy MySQL in Podman
  hosts: mysql
  become: yes
  vars: 
    mysql_root_password: ExpenseApp@1
    login_host: mysql.jioairlines.online
    
  tasks:
    - name: Install MySQL Server (RHEL 9)
      ansible.builtin.package:
        name: mysql-server
        state: present

    - name: Start MySQL server
      ansible.builtin.systemd:
        name: mysqld
        state: started
        enabled: true
    
    - name: connect mysql server 
      coounity.mysql.mysql_info: 
        login_user: root 
        login_password: "{{ mysql_root_password }}"
        login_host: "{{ login_host }}"
      register: mysql_info 

    - name: print mysql info 
      ansible.builtin.debug: 
        msg: "{{ mysql_info }}"

    - name: setup MySQL root password 
      ansible.builtin.command: "mysql_secure_installation --set_root_pass {{ mysql_root_password }}"
      when: mysql_info.failed is true

