- name: mysql configurations
  hosts: mysql
  become: yes
  tasks:
    - name: Download MySQL Yum Repository RPM
      ansible.builtin.get_url:
        url: https://repo.mysql.com/mysql80-community-release-el7-3.noarch.rpm
        dest: /tmp/mysql80-community-release-el7-3.noarch.rpm

    - name: Import MySQL GPG Key
      ansible.builtin.rpm_key:
        key: https://repo.mysql.com/RPM-GPG-KEY-mysql
        state: present

    - name: Install MySQL Yum Repository
      ansible.builtin.yum:
        name: /tmp/mysql80-community-release-el7-3.noarch.rpm
        state: present

    - name: Install Oracle MySQL Server
      ansible.builtin.package:
        name: mysql-community-server
        state: present

    - name: Enable and start MySQL service
      ansible.builtin.service:
        name: mysqld
        state: started
        enabled: yes
