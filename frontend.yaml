- name: Configure frontend server 
  hosts: frontend 
  become: yes 
  tasks: 
  - name: install nginx server 
    ansible.builtin.package:
      name: nginx 
      state: present

  - name: start nginx server 
    ansible.builtin.service:
      name: nginx 
      state: started 
      enabled: yes 

  - name: Recursively remove directory 
    ansible.builtin.file: 
      path: /usr/share/nginx/html 
      state: absent 

  - name: Create html directory 
    ansible.builtin.file: 
      path: /usr/share/nginx/html 
      state: directory 

  - name: download the frontend code 
    ansible.builtin.get_url: 
      url: https://expense-builds.s3.us-east-1.amazonaws.com/expense-frontend-v2.zip
      dest: /tmp/frontend.zip
    
  - name: extract the code 
    ansible.builtin.unarchive: 
      src: /tmp/frontend.zip # by default ansible thinks this is ansible sever 
      dest: /usr/share/nginx/html
      remote_src: yes 
  - name: add SELinux file context rule
    ansible.builtin.command: semanage fcontext -a -t httpd_sys_content_t "/usr/share/nginx/html(/.*)?"

  - name: apply SELinux context
    ansible.builtin.command: restorecon -Rv /usr/share/nginx/html

  # - name: set SELinux context for frontend files
  #   ansible.builtin.command: chcon -t httpd_sys_content_t /usr/share/nginx/html -R

  - name: copy expense conf
    ansible.builtin.copy:
      src: expense.conf
      dest: /etc/nginx/conf.d/expense.conf   # corrected path

  
  # - name: copy expense conf 
  #   ansible.builtin.copy: 
  #     src: expense.conf 
  #     dest: /etc/nginx/default.d/expense.conf 

  - name: restart nginx   
    ansible.builtin.service: 
      name: nginx 
      state: restarted  