[bastion]
bastion.jioairlines.online

[mysql]
mysql.jioairlines.online ansible_ssh_common_args='-o ProxyCommand="ssh -i ~/.ssh/nv-ansible.pem -W %h:%p ec2-user@bastion.jioairlines.online"'

[backend]
backend.jioairlines.online ansible_ssh_common_args='-o ProxyCommand="ssh -i ~/.ssh/nv-ansible.pem -W %h:%p ec2-user@bastion.jioairlines.online"'

[frontend]
frontend.jioairlines.online

[all:vars]
ansible_user=ec2-user
ansible_ssh_private_key_file=~/.ssh/nv-ansible.pem
