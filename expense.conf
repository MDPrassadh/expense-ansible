server {
    listen 80;
    server_name jioairlines.online;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    proxy_http_version 1.1;

    location /api/ {
        proxy_pass http://backend.jioairlines.online:8080/;
    }

    location /health {
        stub_status on;
        access_log off;
    }
}
